services:
  postgres:
    image: postgres:15
    container_name: carte_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ziad2004
      POSTGRES_DB: carte_etudiant
    ports:
      - "5432:5432"
